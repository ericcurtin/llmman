name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 ──────────────────────────────────────────────────
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            go-os: linux
            binary: llmman

          # ── Linux aarch64 ─────────────────────────────────────────────────
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            go-os: linux
            binary: llmman

          # ── macOS aarch64 (Apple Silicon) ─────────────────────────────────
          - target: aarch64-apple-darwin
            runner: macos-15
            go-os: darwin
            binary: llmman

          # ── Windows x86_64 ────────────────────────────────────────────────
          # lld-link is used instead of MSVC link.exe: it accepts clang's
          # .pdata format (fixing LNK1223) and GNU ar archives (fixing LNK4003).
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
            go-os: windows
            binary: llmman.exe
            msvc-arch: amd64
            rustflags: "-C linker=lld-link"

          # ── Windows aarch64 ───────────────────────────────────────────────
          # ARM64 uses the MSVC-native link.exe (put first in PATH by
          # ilammy/msvc-dev-cmd) rather than lld-link: the lld-link in
          # C:\Program Files\LLVM\bin on the ARM64 runner is an x86_64
          # binary running under emulation; it opens ARM64 archives but
          # silently ignores ARM64 COFF objects (machine type mismatch),
          # reporting every CGO export as an undefined symbol.
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            go-os: windows
            binary: llmman.exe
            msvc-arch: arm64
            rustflags: ""

    steps:
      - uses: actions/checkout@v4

      # ── Go toolchain ──────────────────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go-shim/go.sum

      # ── Rust toolchain ────────────────────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # ── Go module cache ───────────────────────────────────────────────────
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ matrix.go-os }}-${{ hashFiles('go-shim/go.sum') }}
          restore-keys: go-${{ matrix.go-os }}-

      # ── Windows: set up MSVC with the correct target architecture ─────────
      # msvc-arch is explicit in the matrix so the ARM64 runner gets the ARM64
      # toolchain rather than the default x64, which would cause the wrong
      # assembler to be used when CGO compiles Go's ARM64 runtime stubs.
      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc-arch }}

      # ── Linux: C compiler (always needed for CGO) ─────────────────────────
      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y gcc

      # ── Diagnostics: show which C/linker tools will be used (Windows) ───────
      - name: Show Windows toolchain info
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "=== clang ===" ; where.exe clang ; clang --version 2>&1 | Select-Object -First 1
          Write-Host "=== lld-link ===" ; where.exe lld-link 2>&1 ; (Get-Command lld-link -ErrorAction SilentlyContinue)?.Source
          Write-Host "=== link ===" ; where.exe link 2>&1 | Select-Object -First 1

      # ── Build (Docker backend, default) ───────────────────────────────────
      - name: Build (docker backend)
        run: cargo build --release --target ${{ matrix.target }}
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}

      # ── Build (Podman backend) ────────────────────────────────────────────
      # Skipped on Windows: containers/image has no Windows support.
      - name: Build (podman backend)
        if: runner.os != 'Windows'
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features podman
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}

      # ── Diagnostics: inspect the Go shim library on Windows ARM64 ───────────
      - name: Inspect shim library (Windows aarch64)
        if: always() && matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          $lib = Get-ChildItem -Recurse -Path "target" -Filter "llmman_shim.lib" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($lib) {
            Write-Host "Found: $($lib.FullName) ($($lib.Length) bytes)"
            dumpbin /HEADERS "$($lib.FullName)" 2>&1 | Select-Object -First 20
            dumpbin /EXPORTS "$($lib.FullName)" 2>&1 | Select-String "llmman"
          } else {
            Write-Host "llmman_shim.lib NOT FOUND"
          }

      # ── Upload artefacts ──────────────────────────────────────────────────
      - name: Upload binary (docker)
        uses: actions/upload-artifact@v4
        with:
          name: llmman-docker-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Release: attach binaries to GitHub Releases on tag push
  # --------------------------------------------------------------------------
  release:
    name: Release
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: llmman-docker-*
          merge-multiple: false

      - name: Rename binaries for release
        shell: bash
        run: |
          cd dist
          for dir in */; do
            target="${dir%/}"          # e.g. llmman-docker-x86_64-unknown-linux-gnu
            triple="${target#llmman-docker-}"
            src="$dir/llmman"
            [ -f "$dir/llmman.exe" ] && src="$dir/llmman.exe"
            ext="${src##*.}"
            [ "$ext" = "llmman" ] && ext=""  # no extension
            [ "$ext" != "" ] && ext=".$ext"
            cp "$src" "llmman-${triple}${ext}"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/llmman-*
